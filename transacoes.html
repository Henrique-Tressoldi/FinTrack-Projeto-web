<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinTrack — Transações</title>
  <meta name="description" content="Gerencie suas transações financeiras. Adicione, edite e filtre receitas e despesas.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ====== Sidebar ====== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">💰</span>
        <h1 class="logo-text">FinTrack</h1>
      </div>
      <button class="sidebar-close" id="sidebarClose" aria-label="Fechar menu">&times;</button>
    </div>
    <nav class="sidebar-nav">
      <a href="index.html" class="nav-link" id="nav-dashboard">
        <span class="nav-icon">📊</span>
        <span class="nav-text">Dashboard</span>
      </a>
      <a href="transacoes.html" class="nav-link active" id="nav-transacoes">
        <span class="nav-icon">💸</span>
        <span class="nav-text">Transações</span>
      </a>
      <a href="categorias.html" class="nav-link" id="nav-categorias">
        <span class="nav-icon">🏷️</span>
        <span class="nav-text">Categorias</span>
      </a>
    </nav>
  </aside>
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ====== Main Content ====== -->
  <main class="main-content">
    <header class="top-header">
      <button class="menu-toggle" id="menuToggle" aria-label="Abrir menu">☰</button>
      <h2 class="page-title">Transações</h2>
    </header>

    <div class="page-content fade-in">

      <div class="section-header">
        <h3 class="section-title">Todas as Transações</h3>
        <button class="btn btn-primary" id="btnAddTransaction">
          <span>＋</span> Nova Transação
        </button>
      </div>

      <!-- Filtros -->
      <div class="filter-bar" role="search" aria-label="Filtros de transações">
        <select class="form-select" id="filterType" style="max-width: 180px;" aria-label="Filtrar por tipo">
          <option value="todas">Todos os tipos</option>
          <option value="receita">Receitas</option>
          <option value="despesa">Despesas</option>
        </select>
        <select class="form-select" id="filterCategory" style="max-width: 200px;" aria-label="Filtrar por categoria">
          <option value="todas">Todas as categorias</option>
        </select>
        <input type="date" class="form-input" id="filterDateStart" style="max-width: 170px;" title="Data inicial" aria-label="Data inicial">
        <input type="date" class="form-input" id="filterDateEnd" style="max-width: 170px;" title="Data final" aria-label="Data final">
      </div>

      <!-- Lista de Transações -->
      <div id="transactionList"></div>

    </div>
  </main>

  <!-- ====== Modal: Adicionar/Editar Transação ====== -->
  <div class="modal-overlay" id="transactionModal" role="dialog" aria-modal="true" aria-labelledby="transactionModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="transactionModalTitle">Nova Transação</h3>
        <button class="modal-close" aria-label="Fechar">&times;</button>
      </div>
      <div class="modal-body">
        <form id="transactionForm" novalidate>
          <input type="hidden" id="transactionId">

          <div class="form-group">
            <label class="form-label" for="transDescription">Descrição</label>
            <input type="text" class="form-input" id="transDescription" placeholder="Ex: Almoço, Salário mensal..." required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="transValue">Valor (R$)</label>
              <input type="number" class="form-input" id="transValue" placeholder="0,00" step="0.01" min="0.01" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="transDate">Data</label>
              <input type="date" class="form-input" id="transDate" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label" for="transType">Tipo</label>
              <select class="form-select" id="transType" required>
                <option value="receita">Receita</option>
                <option value="despesa">Despesa</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label" for="transCategory">Categoria</label>
              <select class="form-select" id="transCategory" required>
              </select>
            </div>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-secondary modal-close">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="btnSaveTransaction">Salvar</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/transacoes.js"></script>
</body>
</html>
